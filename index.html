<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>PoketCodeAgency</title>
</head>

<body>

    <!--navbar-->
    <header class="shadow-sm fixed w-full absolute bg-white/0 backdrop-blur-sm z-10 max-h-[70px] ">
        <nav class="flex justify-between items-center py-3 px-10 max-w-screen-xl mx-auto">
            <img class="w-22" src="img/pcawb.svg" alt="">
            <div class="flex gap-10 items-center">
                <a class="text-xl font-medium text-[var(--primary-color)] transition duration-300 hover:text-[var(--secondary-color)]" href="">Home</a>
                <a class="text-xl font-medium text-[var(--primary-color)] transition duration-300 hover:text-[var(--secondary-color)]" href="">Services</a>
                <a class="text-xl font-medium text-[var(--primary-color)] transition duration-300 hover:text-[var(--secondary-color)]" href="">Projects</a>
                <a class="text-xl font-medium text-[var(--primary-color)] transition duration-300 hover:text-[var(--secondary-color)]" href="">About_Us</a>
            </div>
            <a class="text-xl text-white py-2 px-8 rounded-full bg-[var(--primary-color)] transition duration-300 ease-out hover:bg-[var(--secondary-color)] hover:transform-[scale(1.05)] hover:shadow-xl" href="">Contact_Us</a>
        </nav>
    </header>
    <!--navbar-->

    <!--hero section-->
    <main class="bg-indigo-950/90 bg-[url('img/labtop.jpg')] bg-cover h-screen bg-blend-multiply">
        <div class="h-[70px] opacity-0"></div>
        <div class="h-[calc(100vh-80px)] flex flex-col justify-center items-center text-center gap-4 relative">
            <div class="absolute w-100 h-100 bg-[var(--decoration-color)]/30 rounded-full top-0 left-50 z-0 blur-[10rem]"></div>
            <div class="absolute w-50 h-50 bg-[var(--decoration-color)]/70 rounded-full bottom-0 right-100 z-0 blur-[10rem] "></div>

            <h2 class="text-xl font-medium text-indigo-100 bg-indigo-950/60 border-2 border-indigo-950 px-3 py-1 rounded-full mb-4 z-1"><i class="fa-solid fa-code"></i> Web Development Agency</h2>
            <img class="w-200 z-1" src="img/pcawordbbb.svg" alt="">
            <h2 class="text-4xl font-[Plus Jakarta Sans , sans-serif] font-bold text-indigo-100 z-1">" Your Vision, Our Code "</h2>
            <p class="text-xl font-medium text-gray-200 max-w-2xl z-1">
                We design and build <span class="text-[var(--primary-color-light)]">clean</span>, <span class="text-[var(--primary-color-light)]">fast</span>, and <span class="text-[var(--primary-color-light)]">professional</span>
                websites — Tailored for businesses that want to stand out 
                <span class="text-[var(--secondary-color)]">online</span>.
            </p>
            <div class="flex ">
                <a class="text-xl font-medium py-3 px-10 rounded-l-4xl rounded-r-lg bg-[var(--primary-color)] text-white mx-2 transition duration-300 ease-out hover:bg-[var(--secondary-color)] hover:transform-[scale(1.05)] hover:shadow-xl z-1" href="">Let's Work Together</a>
                <a class="text-xl font-medium py-3 px-10 rounded-4xl rounded-l-lg backdrop-blur-sm border border-indigo-500/50 text-white mx-2 transition duration-300 ease-out hover:text-[var(--primary-color)] hover:transform-[scale(1.05)] hover:shadow-xl z-1" href="">Check Our Services</a> 
            </div>
            

        </div>

    </main>

    <!--hero section-->

</body>
</html>
